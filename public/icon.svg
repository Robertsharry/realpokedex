<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Red background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pokeball line -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="#7f1d1d" stroke-width="8"/>
  <!-- Scanner lens outer -->
  <circle cx="256" cy="200" r="100" fill="url(#lens)"/>
  <!-- Scanner lens inner -->
  <circle cx="256" cy="200" r="80" fill="#67e8f9" opacity="0.8"/>
  <!-- Scanner lens highlight -->
  <circle cx="256" cy="200" r="60" fill="#ffffff" opacity="0.3"/>
  <circle cx="225" cy="170" r="22" fill="#ffffff" opacity="0.7"/>
  <!-- Indicator lights -->
  <circle cx="130" cy="420" r="20" fill="#ef4444"/>
  <circle cx="200" cy="420" r="14" fill="#facc15"/>
  <circle cx="256" cy="420" r="14" fill="#4ade80"/>
</svg>
